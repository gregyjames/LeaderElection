# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  # Run on all PRs
  pull_request:
    branches:
      - "**"
    types:
      - opened
      - synchronize
      - reopened
      - unlocked # enables easy re-triggering of the workflow by locking and unlocking the PR

permissions:
  contents: read # required for cloning the repo

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    # Note: Our tests depend on linux containers, such as Redis, but
    # Windows runners don't support linux containers and MacOS runners
    # don't support containers at all. So we're limited to linux runners for now.
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      # Cache NuGet packages to speed up builds
      - uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          # key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          # We don't use a package lock so we can't key off that, but we can
          # use the hash of all project files to invalidate the cache when
          # dependencies change.
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.*.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Package
        run: dotnet pack --no-build --configuration Release
